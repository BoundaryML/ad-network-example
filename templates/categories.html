{% extends "base.html" %}
{% block title %}Categories - People Finder{% endblock %}
{% block content %}
<h1>Categories</h1>

<div class="card" style="padding: 0; overflow-x: auto;">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Category</th>
        <th>Ads</th>
        <th>People Reached</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for cat in categories %}
      <tr>
        <td style="color: #888; font-size: 0.8rem;">{{ cat.id }}</td>
        <td><strong>{{ cat.name }}</strong></td>
        <td>
          <a href="/ads?category={{ cat.id }}">{{ cat.ad_count }} ads</a>
        </td>
        <td>{{ cat.people_count }}</td>
        <td>
          <a href="/?categories={{ cat.id }}" class="btn btn-ghost" style="padding: 0.25rem 0.6rem; font-size: 0.8rem;">
            Search people
          </a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
